<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D摇奖机（近100期数据）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f172a;color:#fff;font-family:"PingFang SC",sans-serif;padding:20px;}
h1{text-align:center;color:#ffd700;margin-bottom:20px;font-size:24px;}
.box{display:flex;justify-content:center;gap:15px;margin:30px 0;}
.num{width:80px;height:120px;border:2px solid #ffd700;border-radius:10px;background:#1e293b;overflow:hidden;position:relative;}
.num div{position:absolute;width:100%;text-align:center;transition:transform 0.1s linear;}
.num div span{display:block;height:120px;line-height:120px;font-size:60px;font-weight:bold;color:#fff;}
.btn{display:flex;justify-content:center;gap:20px;margin:20px 0;}
button{padding:12px 24px;font-size:18px;border-radius:8px;border:none;background:#ffd700;color:#000;font-weight:bold;}
.info{background:#1e293b;padding:15px;border-radius:10px;margin-top:20px;font-size:14px;line-height:1.8;}
.hot{color:#ff5555;}
.cold{color:#4cd964;}
</style>
</head>
<body>
<h1>福彩3D 模拟摇奖机（近100期数据）</h1>

<div class="box">
  <div class="num"><div id="b"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
  <div class="num"><div id="s"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
  <div class="num"><div id="g"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
</div>

<div class="btn">
  <button id="start">开始摇奖</button>
  <button id="stop">停止开奖</button>
</div>

<div class="info">
<p>📊 近100期冷热号（加权概率）</p>
<p>百位：热号 <span class="hot">1、6</span>｜冷号 <span class="cold">7、8</span></p>
<p>十位：热号 <span class="hot">2、8</span>｜冷号 <span class="cold">9</span></p>
<p>个位：热号 <span class="hot">1、7</span>｜冷号 <span class="cold">4</span></p>
<p>💡 仅做模拟娱乐，非官方开奖</p>
</div>

<script>
// 近100期频次：百、十、个
const w=[
  [12,15,10,8,11,9,13,7,6,9],
  [10,11,14,7,12,8,10,9,15,4],
  [9,13,11,10,7,12,8,14,10,6]
];
let t=[null,null,null],roll=false;
const el=[document.getElementById('b'),document.getElementById('s'),document.getElementById('g')];

function rnd(p){
  let a=[];
  for(let i=0;i<10;i++)for(let j=0;j<w[p][i];j++)a.push(i);
  return a[Math.random()*a.length|0];
}

document.getElementById('start').onclick=()=>{
  if(roll)return;roll=1;
  for(let i=0;i<3;i++){
    let y=0;
    t[i]=setInterval(()=>el[i].style.transform=`translateY(-${y++*120}px)`,70);
  }
};

document.getElementById('stop').onclick=()=>{
  if(!roll)return;roll=0;
  for(let i=0;i<3;i++){
    clearInterval(t[i]);
    el[i].style.transform=`translateY(-${rnd(i)*120}px)`;
  }
};
</script>
</body>
</html>
