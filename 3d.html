<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福彩3D 官方模拟摇奖机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        .title {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .history-data {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .history-title {
            font-size: 16px;
            color: #ffd700;
            margin-bottom: 10px;
            text-align: center;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            font-size: 14px;
        }
        .roll-wrap {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        .num-box {
            width: 80px;
            height: 120px;
            border: 3px solid #ffd700;
            border-radius: 10px;
            background: #1e293b;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        .num-list {
            position: absolute;
            width: 100%;
            text-align: center;
            transition: transform 0.1s linear;
        }
        .num-list span {
            display: block;
            height: 120px;
            line-height: 120px;
            font-size: 60px;
            font-weight: bold;
            color: #fff;
        }
        .btn {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            background: #ffd700;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:disabled {
            background: #666;
            color: #aaa;
            cursor: not-allowed;
        }
        .info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.8;
            max-width: 400px;
            text-align: center;
        }
        .hot { color: #ff5555; }
        .cold { color: #4cd964; }
        .tip {
            color: #aaa;
            font-size: 12px;
            margin-top: 10px;
        }
        /* 烟花特效 */
        .firework {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: explode 1s ease-out forwards;
            pointer-events: none;
        }
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <h1 class="title">福彩3D 官方模拟摇奖机</h1>

    <div class="history-data">
        <div class="history-title">近10期官方开奖数据（仅展示）</div>
        <div class="history-list" id="historyList"></div>
    </div>

    <div class="roll-wrap">
        <div class="num-box">
            <div class="num-list" id="b">
                <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
                <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
            </div>
        </div>
        <div class="num-box">
            <div class="num-list" id="s">
                <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
                <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
            </div>
        </div>
        <div class="num-box">
            <div class="num-list" id="g">
                <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
                <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
            </div>
        </div>
    </div>

    <div class="btn">
        <button id="startBtn">开始摇奖</button>
        <button id="stopBtn" disabled>停止开奖</button>
    </div>

    <div class="info">
        <p>📊 近100期冷热号（模拟分布）</p>
        <p>百位：热号 <span class="hot">1、6</span>｜冷号 <span class="cold">7、8</span></p>
        <p>十位：热号 <span class="hot">2、8</span>｜冷号 <span class="cold">9</span></p>
        <p>个位：热号 <span class="hot">1、7</span>｜冷号 <span class="cold">4</span></p>
        <p class="tip">⚠️ 本工具为模拟体验，不做任何预测，开奖结果与官方无关</p>
    </div>

    <script>
        // 1. 模拟官方历史数据（仅展示用）
        const mockHistoryData = [
            { issue: "2026120", num: "1 6 8" },
            { issue: "2026119", num: "2 3 7" },
            { issue: "2026118", num: "9 1 5" },
            { issue: "2026117", num: "0 4 2" },
            { issue: "2026116", num: "7 8 1" },
            { issue: "2026115", num: "3 9 6" },
            { issue: "2026114", num: "5 2 4" },
            { issue: "2026113", num: "8 7 0" },
            { issue: "2026112", num: "1 3 9" },
            { issue: "2026111", num: "6 5 2" }
        ];

        // 渲染历史数据
        const historyList = document.getElementById('historyList');
        mockHistoryData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>第${item.issue}期</span><span style="color:#ffd700">${item.num}</span>`;
            historyList.appendChild(div);
        });

        // 2. 每日一次摇奖限制
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        let roll = false;
        let t = [null, null, null];

        // 检查今日是否已摇奖
        const today = new Date().toDateString();
        const lastRollDate = localStorage.getItem('lastRollDate');
        if (lastRollDate === today) {
            startBtn.disabled = true;
            startBtn.textContent = "今日摇奖次数已用完";
        }

        // 3. 摇奖逻辑（带冷热号加权）
        const hotColdWeights = {
            b: { hot: [1,6], cold: [7,8], other: [0,2,3,4,5,9] },
            s: { hot: [2,8], cold: [9], other: [0,1,3,4,5,6,7] },
            g: { hot: [1,7], cold: [4], other: [0,2,3,5,6,8,9] }
        };

        function getWeightedNum(pos) {
            const { hot, cold, other } = hotColdWeights[pos];
            // 权重：热号40%，普通号50%，冷号10%
            const rand = Math.random();
            let pool;
            if (rand < 0.4) pool = hot;
            else if (rand < 0.9) pool = other;
            else pool = cold;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function rollNum(elId) {
            const el = document.getElementById(elId);
            let pos = 0;
            return setInterval(() => {
                pos = (pos + 1) % 10;
                el.style.transform = `translateY(-${pos * 120}px)`;
            }, 70);
        }

        // 开始摇奖
        startBtn.addEventListener('click', () => {
            if (roll) return;
            roll = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            t = [rollNum('b'), rollNum('s'), rollNum('g')];
        });

        // 停止摇奖
        stopBtn.addEventListener('click', () => {
            if (!roll) return;
            roll = false;
            stopBtn.disabled = true;
            // 停止所有定时器
            t.forEach(clearInterval);
            // 生成最终号码
            const bNum = getWeightedNum('b');
            const sNum = getWeightedNum('s');
            const gNum = getWeightedNum('g');
            // 定位到最终号码
            document.getElementById('b').style.transform = `translateY(-${bNum * 120}px)`;
            document.getElementById('s').style.transform = `translateY(-${sNum * 120}px)`;
            document.getElementById('g').style.transform = `translateY(-${gNum * 120}px)`;

            // 记录今日摇奖状态
            localStorage.setItem('lastRollDate', today);
            startBtn.disabled = true;
            startBtn.textContent = "今日摇奖次数已用完";

            // 触发彩蛋特效
            const finalNums = [bNum, sNum, gNum];
            if (finalNums.every(n => n === finalNums[0])) {
                createFireworks();
                alert(`恭喜！摇出豹子号：${bNum} ${sNum} ${gNum}`);
            } else if (isConsecutive(finalNums)) {
                createFireworks();
                alert(`恭喜！摇出顺子号：${bNum} ${sNum} ${gNum}`);
            } else {
                alert(`模拟开奖结果：${bNum} ${sNum} ${gNum}`);
            }
        });

        // 判断顺子号
        function isConsecutive(arr) {
            const sorted = [...arr].sort((a,b) => a-b);
            return (sorted[1] === sorted[0]+1 && sorted[2] === sorted[1]+1) ||
                   (sorted[0] === 0 && sorted[1] === 8 && sorted[2] === 9) ||
                   (sorted[0] === 0 && sorted[1] === 1 && sorted[2] === 9);
        }

        // 烟花特效
        function createFireworks() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            for (let i = 0; i < 30; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.style.left = `${Math.random() * 100}vw`;
                firework.style.top = `${Math.random() * 100}vh`;
                firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(firework);
                setTimeout(() => firework.remove(), 1000);
            }
        }
    </script>
</body>
</html>
